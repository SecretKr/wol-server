<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wake on LAN Server</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <h1>Wake on LAN</h1>
            <p class="subtitle">Manage and wake your devices remotely</p>
        </header>

        <main>
            <section class="device-list-section">
                <h2>Your Devices</h2>
                <div id="deviceList" class="device-grid">
                    <div class="loading">Loading devices...</div>
                </div>
            </section>

            <section class="card add-device-card">
                <h2>Add New Device</h2>
                <form id="addDeviceForm">
                    <div class="form-group">
                        <label for="name">Device Name</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="mac">MAC Address</label>
                        <input type="text" id="mac" name="mac" placeholder="AA:BB:CC:DD:EE:FF" required
                            pattern="^([0-9A-Fa-f]{2}[:-]){5}([0-9A-Fa-f]{2})$">
                    </div>
                    <button type="submit" class="btn btn-primary">Add Device</button>
                </form>
            </section>
        </main>
    </div>

    <div id="toast" class="toast hidden">Action successful</div>
    <script src="/static/app.js"></script>
</body>

</html>
